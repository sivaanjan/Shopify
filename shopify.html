<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopify Hero Clone</title>
  <link rel="stylesheet" href="shopify.css">
</head>
<body>
  
  <header class="navbar">
    <div class="logo">
      <img src="https://cdn.shopify.com/b/shopify-brochure2-assets/177d09fab2ac0c32b7e0fe9f4ab1a9dd.svg" alt="Shopify Logo" />
    </div>
    <nav>
      <ul>
        <li><a href="#">Solutions</a></li>
        <li><a href="https://www.shopify.com/in/pricing">Pricing</a></li>
        <li><a href="#">Resources</a></li>
        <li><a href="#">Enterprise</a></li>
        <li><a href="#">What's new</a></li>
      </ul>
    </nav>
    <div class="buttons">
      <a href="#" class="login">Log in</a>
      <a href="#" class="btn">Start for free</a>
    </div>
  </header>
  
  <section class="hero">
    <video autoplay muted loop playsinline class="hero-video">
      <source src="zvymsxmg---httpswwwyoutubecomwatchvvu.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>

    <div class="hero-content">
      <h1><strong>Be the next<br>global empire</strong></h1>
      <p>Dream big, build fast, and grow far on Shopify.</p>
      <a href="#" class="btn large">Start for free</a>
    </div>
  </section>
</body>
</html>
